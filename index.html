<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Pro Jorge</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
            --text: #f1f5f9; --text-dim: #94a3b8;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 80px; }
        
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--card); margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--accent); font-size: 24px; letter-spacing: 2px; }
        .month-selector { background: var(--card); color: white; border: 1px solid var(--accent); padding: 8px 20px; border-radius: 20px; margin-top: 10px; font-weight: bold; }

        /* Dashboard de Resumen */
        .resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .res-box { background: var(--card); padding: 15px; border-radius: 15px; border-left: 4px solid var(--accent); }
        .res-box span { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .res-box strong { font-size: 16px; color: #fff; font-family: 'Courier New'; }

        /* Estilo de Tarjetas (Cards) */
        .section-title { font-size: 14px; color: var(--accent); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 800; display: flex; justify-content: space-between; }
        
        .item-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; position: relative; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .item-title { font-size: 16px; font-weight: bold; color: #fff; max-width: 70%; }
        .item-date { font-size: 11px; color: var(--accent); background: rgba(56, 189, 248, 0.1); padding: 2px 8px; border-radius: 10px; }
        
        .item-body { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .price-tag { line-height: 1.2; }
        .price-tag label { display: block; font-size: 10px; color: var(--text-dim); }
        .price-tag span { font-family: 'Courier New'; font-weight: bold; font-size: 14px; }

        .btn-status { padding: 8px 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 11px; color: white; min-width: 80px; }
        .paid { background: var(--success); box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        .pend { background: var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

        /* Formulario Flotante o Inputs */
        .input-card { background: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px dashed var(--accent); }
        input, select { width: 100%; height: 45px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; padding: 0 15px; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; }
        .btn-add { background: var(--accent); color: #000; font-weight: bold; border: none; width: 100%; height: 45px; border-radius: 10px; font-size: 14px; }

        .del-btn { position: absolute; top: -5px; right: -5px; background: #475569; color: white; width: 22px; height: 22px; border-radius: 50%; border: none; font-size: 12px; }

        /* Diario - Barra de Progreso */
        .progress-container { width: 100%; background: #0f172a; height: 8px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--success); transition: width 0.3s; }

        .footer-btns { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); padding: 10px; display: flex; gap: 10px; border-top: 1px solid var(--card); }
        .f-btn { flex: 1; height: 50px; border-radius: 12px; border: none; font-weight: bold; color: white; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>GESTOR FINANCIERO</h1>
        <input type="text" id="mes-actual" class="month-selector" value="MAYO 2026" oninput="save()">
    </div>

    <div class="resumen-grid">
        <div class="res-box" style="border-color: var(--success)">
            <span>Ingresos</span>
            <strong id="res-ing">$ 0</strong>
        </div>
        <div class="res-box" style="border-color: var(--danger)">
            <span>Egresos</span>
            <strong id="res-gas">$ 0</strong>
        </div>
        <div class="res-box" style="border-color: var(--warning)">
            <span>Ahorro Extra</span>
            <strong id="res-aho">$ 0</strong>
        </div>
        <div class="res-box" style="border-color: var(--accent)">
            <span>Saldo Final</span>
            <strong id="res-dif">$ 0</strong>
        </div>
    </div>

    <div class="section-title">2. Saldos Actuales <span>💸</span></div>
    <div id="list-disp"></div>
    <div class="input-card">
        <input type="text" id="d-n" placeholder="Nombre (Nequi, Efectivo...)">
        <div style="display:flex; gap:10px">
            <input type="number" id="d-j" placeholder="Jorge $">
            <input type="number" id="d-l" placeholder="Leidy $">
        </div>
        <button class="btn-add" onclick="addDisp()">+ GUARDAR SALDO</button>
    </div>

    <div class="section-title">3 y 4. Gastos y Pendientes <span>📑</span></div>
    <div id="list-gastos"></div>
    <div class="input-card">
        <input type="date" id="g-f">
        <input type="text" id="g-n" placeholder="¿En qué gastaste?">
        <div style="display:flex; gap:10px">
            <input type="number" id="g-ppto" placeholder="Ppto $">
            <input type="number" id="g-real" placeholder="Real $">
        </div>
        <button class="btn-add" onclick="addGasto()">+ REGISTRAR GASTO</button>
    </div>

    <div class="section-title">5. Rendimiento Diario <span>🚀</span></div>
    <div id="list-diario"></div>
    <div class="input-card">
        <input type="date" id="i-f">
        <div style="display:flex; gap:10px">
            <input type="number" id="i-meta" placeholder="Meta $">
            <input type="number" id="i-ing" placeholder="Ingreso $">
        </div>
        <div style="display:flex; gap:10px">
            <input type="number" id="i-aho" placeholder="Ahorro $">
            <input type="number" id="i-comb" placeholder="Combustible $">
        </div>
        <button class="btn-add" onclick="addDiario()">+ FINALIZAR DÍA</button>
    </div>

    <div class="footer-btns">
        <button class="f-btn" style="background: var(--success); color: #000" onclick="exportar()">EXCEL</button>
        <button class="f-btn" style="background: #6366f1" onclick="save(true)">GUARDAR TODO</button>
    </div>

<script>
    const fmt = n => '$' + Number(n).toLocaleString('es-CO');
    
    function save(msg = false) {
        const data = {
            mes: document.getElementById('mes-actual').value,
            disp: Array.from(document.querySelectorAll('.card-disp')).map(c => c.dataset),
            gastos: Array.from(document.querySelectorAll('.card-gasto')).map(c => ({...c.dataset, est: c.querySelector('.btn-status').innerText})),
            diario: Array.from(document.querySelectorAll('.card-diario')).map(c => c.dataset)
        };
        localStorage.setItem('db_jorge_2026', JSON.stringify(data));
        if(msg) alert("Datos asegurados localmente ✅");
    }

    window.onload = () => {
        const db = JSON.parse(localStorage.getItem('db_jorge_2026'));
        if(db) {
            document.getElementById('mes-actual').value = db.mes;
            db.disp.forEach(d => renderDisp(d));
            db.gastos.forEach(g => renderGasto(g));
            db.diario.forEach(d => renderDiario(d));
            calc();
        }
    };

    function addDisp() {
        const n = document.getElementById('d-n').value, j = document.getElementById('d-j').value || 0, l = document.getElementById('d-l').value || 0;
        if(!n) return;
        renderDisp({item: n, jorge: j, leidy: l});
        document.getElementById('d-n').value = ''; document.getElementById('d-j').value = ''; document.getElementById('d-l').value = '';
        save();
    }

    function renderDisp(d) {
        const html = `
        <div class="item-card card-disp" data-item="${d.item}" data-jorge="${d.jorge}" data-leidy="${d.leidy}">
            <button class="del-btn" onclick="this.parentElement.remove();save();calc();">×</button>
            <div class="item-header"><div class="item-title">${d.item}</div></div>
            <div class="item-body">
                <div class="price-tag"><label>Jorge</label><span>${fmt(d.jorge)}</span></div>
                <div class="price-tag"><label>Leidy</label><span>${fmt(d.leidy)}</span></div>
                <div class="price-tag" style="text-align:right"><label>Total</label><span style="color:var(--accent)">${fmt(Number(d.jorge)+Number(d.leidy))}</span></div>
            </div>
        </div>`;
        document.getElementById('list-disp').insertAdjacentHTML('beforeend', html);
    }

    function addGasto() {
        const f = document.getElementById('g-f').value, n = document.getElementById('g-n').value, p = document.getElementById('g-ppto').value, r = document.getElementById('g-real').value || 0;
        if(!f || !n || !p) return;
        renderGasto({fecha: f, item: n, ppto: p, real: r, est: 'PEND'});
        save(); calc();
    }

    function renderGasto(g) {
        const colorClass = g.est === 'PAGO' ? 'paid' : 'pend';
        const dif = Number(g.ppto) - Number(g.real);
        const html = `
        <div class="item-card card-gasto" data-fecha="${g.fecha}" data-item="${g.item}" data-ppto="${g.ppto}" data-real="${g.real}">
            <button class="del-btn" onclick="this.parentElement.remove();save();calc();">×</button>
            <div class="item-header">
                <div class="item-title">${g.item}</div>
                <div class="item-date">${g.fecha.split('-').reverse().join('/')}</div>
            </div>
            <div class="item-body">
                <div class="price-tag"><label>Presupuesto</label><span>${fmt(g.ppto)}</span></div>
                <div class="price-tag"><label>Real</label><span>${fmt(g.real)}</span></div>
                <button class="btn-status ${colorClass}" onclick="toggleG(this)">${g.est}</button>
            </div>
        </div>`;
        document.getElementById('list-gastos').insertAdjacentHTML('beforeend', html);
    }

    function toggleG(b) {
        b.innerText = b.innerText === 'PEND' ? 'PAGO' : 'PEND';
        b.className = `btn-status ${b.innerText === 'PAGO' ? 'paid' : 'pend'}`;
        save(); calc();
    }

    function addDiario() {
        const f = document.getElementById('i-f').value, m = document.getElementById('i-meta').value, i = document.getElementById('i-ing').value, a = document.getElementById('i-aho').value || 0, c = document.getElementById('i-comb').value || 0;
        if(!f || !m || !i) return;
        renderDiario({fecha: f, meta: m, ing: i, aho: a, comb: c});
        save(); calc();
    }

    function renderDiario(d) {
        const perc = Math.min((d.ing / d.meta) * 100, 100);
        const html = `
        <div class="item-card card-diario" data-fecha="${d.fecha}" data-meta="${d.meta}" data-ing="${d.ing}" data-aho="${d.aho}" data-comb="${d.comb}">
            <button class="del-btn" onclick="this.parentElement.remove();save();calc();">×</button>
            <div class="item-header">
                <div class="item-title">Ingreso Diario</div>
                <div class="item-date">${d.fecha.split('-').reverse().join('/')}</div>
            </div>
            <div class="item-body">
                <div class="price-tag"><label>Meta</label><span>${fmt(d.meta)}</span></div>
                <div class="price-tag"><label>Logrado</label><span style="color:var(--success)">${fmt(d.ing)}</span></div>
                <div class="price-tag"><label>Ahorro</label><span>${fmt(d.aho)}</span></div>
            </div>
            <div class="progress-container"><div class="progress-bar" style="width: ${perc}%"></div></div>
        </div>`;
        document.getElementById('list-diario').insertAdjacentHTML('beforeend', html);
    }

    function calc() {
        let ing = 0, gas = 0, aho = 0;
        document.querySelectorAll('.card-gasto').forEach(c => gas += Number(c.dataset.real));
        document.querySelectorAll('.card-diario').forEach(c => {
            ing += Number(c.dataset.ing);
            aho += Number(c.dataset.aho);
        });
        document.getElementById('res-ing').innerText = fmt(ing);
        document.getElementById('res-gas').innerText = fmt(gas);
        document.getElementById('res-aho').innerText = fmt(aho);
        const total = ing - gas + aho;
        document.getElementById('res-dif').innerText = fmt(total);
        document.getElementById('res-dif').style.color = total < 0 ? 'var(--danger)' : 'var(--success)';
    }

    function exportar() {
        let csv = "\ufeffREPORTE FINANCIERO\n\n";
        csv += "GASTOS\nConcepto,Fecha,Presupuesto,Real,Estado\n";
        document.querySelectorAll('.card-gasto').forEach(c => {
            csv += `${c.dataset.item},${c.dataset.fecha},${c.dataset.ppto},${c.dataset.real},${c.querySelector('.btn-status').innerText}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Finanzas_Jorge.csv`;
        link.click();
    }
</script>
</body>
</html>
