<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Finanzas 2026 - Master Pro</title>
    <style>
        :root { 
            --bg-body: #121212; --bg-card: #1e1e1e; --header-blue: #1a2a6c;
            --silver: #b0b0b0; --text-main: #e0e0e0; --accent-blue: #00d4ff;
            --danger: #ff4d4d; --success: #00e676; --border-silver: #444;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 10px; padding-bottom: 50px; }

        .main-header { text-align: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border-silver); }
        .main-header h1 { margin: 0; color: var(--accent-blue); font-size: 20px; text-transform: uppercase; }
        .month-input { background: #333; color: white; border: 1px solid var(--border-silver); padding: 4px 10px; border-radius: 4px; margin-top: 8px; font-weight: bold; text-align: center; }
        
        .card { background: var(--bg-card); border-radius: 12px; padding: 12px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); border: 1px solid var(--border-silver); overflow: hidden; }
        .card-header { background: linear-gradient(90deg, var(--header-blue), #003366); color: white; margin: -12px -12px 12px -12px; padding: 10px; font-weight: bold; text-align: center; font-size: 11px; text-transform: uppercase; border-radius: 12px 12px 0 0; border-bottom: 2px solid var(--silver); }
        
        table { width: 100%; border-collapse: collapse; font-size: 9px; table-layout: fixed; }
        th { background: #2c2c2c; color: var(--silver); border-bottom: 1px solid var(--border-silver); padding: 6px 2px; text-align: left; }
        td { border-bottom: 1px solid #333; padding: 8px 2px; color: #ccc; overflow: hidden; text-overflow: ellipsis; }
        
        .val { text-align: right; font-weight: bold; font-family: 'Consolas', monospace; color: white; }

        .status-btn { width: 100%; padding: 4px 0; border-radius: 4px; border: none; font-weight: bold; font-size: 7px; cursor: pointer; color: #000; text-transform: uppercase; }
        .btn-paid { background: var(--success); }
        .btn-pending { background: var(--danger); }

        .indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
        .ind-ok { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .ind-bad { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

        .input-group { background: #252525; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        input { height: 38px; padding: 0 10px; background: #333; border: 1px solid var(--border-silver); border-radius: 6px; font-size: 13px; color: white; width: 100%; box-sizing: border-box; }
        .add-btn { height: 38px; background: var(--header-blue); color: white; border: 1px solid var(--accent-blue); border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .delete-btn-x { background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold; font-size: 12px; }

        /* Ajustes Columnas Campo 3 */
        .col3-f { width: 14%; } .col3-con { width: 22%; } .col3-mon { width: 18%; } .col3-pag { width: 18%; } .col3-ok { width: 8%; } .col3-st { width: 12%; } .col3-x { width: 8%; }

        .footer-logo { text-align: center; margin-top: 30px; padding-bottom: 20px; }
        .footer-logo img { height: 45px; }
    </style>
</head>
<body>

    <div class="main-header">
        <h1>Control Financiero</h1>
        <input type="text" class="month-input" value="ABRIL 2026">
    </div>

    <div class="card">
        <div class="card-header">1. Resumen Ejecutivo</div>
        <table>
            <tr><td>INGRESOS TOTALES</td><td class="val" id="res-ingresos" style="color: var(--accent-blue);">$ 0</td></tr>
            <tr><td>GASTOS TOTALES (Monto Ppto)</td><td class="val" id="res-gastos" style="color: var(--danger);">$ 0</td></tr>
            <tr style="background: rgba(0, 230, 118, 0.05);"><td>AHORRO ACUMULADO</td><td class="val" id="res-ahorro" style="color: var(--success);">$ 0</td></tr>
            <tr style="background: #2a2a2a;"><td style="font-weight: bold;">DIFERENCIA FINAL</td><td class="val" id="res-diferencia" style="font-size: 1.1em;">$ 0</td></tr>
        </table>
    </div>

    <div class="card">
        <div class="card-header">3. Gastos Fijos (Egresos)</div>
        <table>
            <thead>
                <tr>
                    <th class="col3-f">Fecha</th>
                    <th class="col3-con">Item</th>
                    <th class="col3-mon">Monto</th>
                    <th class="col3-pag">Real</th>
                    <th class="col3-ok">Aho</th>
                    <th class="col3-st">Estado</th>
                    <th class="col3-x">X</th>
                </tr>
            </thead>
            <tbody id="body-mensual">
                </tbody>
        </table>
        <div class="input-group">
            <input type="date" id="in-m-f">
            <input type="text" id="in-m-n" placeholder="Concepto">
            <div style="display: flex; gap: 5px;">
                <input type="number" id="in-m-v" placeholder="Monto Ppto $">
                <input type="number" id="in-m-p" placeholder="Monto Real $">
            </div>
            <button class="add-btn" onclick="addMensual()">+ Registrar Gasto</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">5. Seguimiento Diario</div>
        <table id="t-diario-full">
            <tbody id="body-diario"></tbody>
        </table>
        <div class="input-group">
            <input type="date" id="in-di-f">
            <div style="display: flex; gap: 5px;">
                <input type="number" id="in-di-p" placeholder="Ppto $">
                <input type="number" id="in-di-r" placeholder="Real $">
            </div>
            <button class="add-btn" onclick="addDiario()">+ Registrar Día</button>
        </div>
    </div>

    <div class="footer-logo">
        <p>Desarrollado por:</p>
        <img src="https://i.ibb.co/Lztv5zM/logo-gestion.png" alt="Gestión & Crecimiento Co.">
    </div>

<script>
    function fmt(n) { return '$' + Number(n).toLocaleString('es-CO'); }
    function k(n) { return (Number(n)/1000).toFixed(0) + 'k'; }
    
    function toggleStatus(btn) {
        btn.innerText = (btn.innerText === "PENDIENTE") ? "PAGADO" : "PENDIENTE";
        btn.className = (btn.innerText === "PAGADO") ? "status-btn btn-paid" : "status-btn btn-pending";
    }

    function delRow(btn) { btn.closest('tr').remove(); recalcularTodo(); }

    function recalcularTodo() {
        let ingresos = 0, ahorro = 0, gastos = 0;
        document.querySelectorAll('#body-diario tr').forEach(r => {
            ingresos += Number(r.getAttribute('data-ppto')) || 0;
            ahorro += Number(r.getAttribute('data-ahorro')) || 0;
        });
        document.querySelectorAll('#body-mensual tr').forEach(r => {
            // El resumen ejecutivo sigue basándose en el monto real pagado
            gastos += Number(r.getAttribute('data-real')) || 0;
        });
        const dif = ingresos - gastos + ahorro;
        document.getElementById('res-ingresos').innerText = fmt(ingresos);
        document.getElementById('res-gastos').innerText = fmt(gastos);
        document.getElementById('res-ahorro').innerText = fmt(ahorro);
        document.getElementById('res-diferencia').innerText = fmt(dif);
        document.getElementById('res-diferencia').style.color = dif < 0 ? 'var(--danger)' : 'var(--success)';
    }

    function addMensual() {
        const f = document.getElementById('in-m-f').value, n = document.getElementById('in-m-n').value, 
              v = document.getElementById('in-m-v').value, p = document.getElementById('in-m-p').value || 0;
        if(!f || !n || !v) return;
        
        const sd = f.split('-').slice(1).reverse().join('/');
        
        // Lógica corregida: 
        // Verde si Real <= Monto (Ahorraste o pagaste justo lo esperado)
        // Rojo si Real > Monto (Pagaste de más)
        const indClass = Number(p) <= Number(v) ? 'ind-ok' : 'ind-bad';
        
        const r = document.getElementById('body-mensual').insertRow();
        r.setAttribute('data-valor', v);
        r.setAttribute('data-real', p);
        r.innerHTML = `
            <td>${sd}</td>
            <td>${n}</td>
            <td class="val">${k(v)}</td>
            <td class="val">${k(p)}</td>
            <td style="text-align:center"><span class="indicator ${indClass}"></span></td>
            <td><button class="status-btn btn-pending" onclick="toggleStatus(this)">PENDIENTE</button></td>
            <td><button class="delete-btn-x" onclick="delRow(this)">X</button></td>`;
        recalcularTodo();
        ['in-m-f','in-m-n','in-m-v','in-m-p'].forEach(id => document.getElementById(id).value = "");
    }

    function addDiario() {
        const f = document.getElementById('in-di-f').value, p = document.getElementById('in-di-p').value, r = document.getElementById('in-di-r').value;
        if(!f || !p || !r) return;
        const sd = f.split('-').slice(1).reverse().join('/');
        const row = document.getElementById('body-diario').insertRow();
        const indicator = Number(r) >= Number(p) ? 'ind-ok' : 'ind-bad';
        row.setAttribute('data-ppto', p);
        row.innerHTML = `<td>${sd}</td><td class="val">${k(p)}</td><td class="val">${k(r)}</td><td class="val">0k</td><td class="val">0k</td><td style="text-align:center"><span class="indicator ${indicator}"></span></td><td><button class="delete-btn-x" onclick="delRow(this)">X</button></td>`;
        recalcularTodo();
        ['in-di-f','in-di-p','in-di-r'].forEach(id => document.getElementById(id).value = "");
    }

    recalcularTodo();
</script>
</body>
</html>
