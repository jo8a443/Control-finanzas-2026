<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Finanzas Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a2a6c; --accent: #b21f1f; --success: #27ae60; --warning: #f39c12; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        
        /* Dashboard Visual */
        .header-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card b { display: block; font-size: 1.2em; color: var(--primary); }
        .stat-card small { color: #888; text-transform: uppercase; font-size: 0.7em; }

        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { font-size: 1.1em; margin: 0 0 15px 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* Estilos de inputs superiores al Excel */
        .input-group { background: #f1f3f4; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        button.primary { background: var(--primary); color: white; border: none; font-weight: bold; }
        
        /* Tabla Pro */
        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f1f1; align-items: center; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75em; font-weight: bold; cursor: pointer; }
        .badge-pending { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .badge-paid { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        canvas { max-height: 180px; margin-bottom: 10px; }
        .tab-btn { background: #eee; color: #555; border: none; padding: 8px; font-size: 0.8em; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header-stats">
    <div class="stat-card">
        <small>Presupuesto</small>
        <b id="totalPpto">$5.750.000</b>
    </div>
    <div class="stat-card">
        <small>Real Gastado</small>
        <b id="totalReal" style="color: var(--accent);">$0</b>
    </div>
</div>

<div class="card">
    <h2>Gráfica de Gastos</h2>
    <canvas id="mainChart"></canvas>
</div>

<div class="card">
    <h2 style="color: var(--accent);">Gasto No Especificado / Diario</h2>
    <div class="input-group">
        <input type="text" id="descGasto" placeholder="¿En qué gastaste hoy?">
        <input type="number" id="montoGasto" placeholder="Monto $">
        <select id="cuentaOrigen">
            <option value="Efectivo">Efectivo</option>
            <option value="Nequi">Nequi</option>
            <option value="Uber/Didi">Uber/Didi</option>
        </select>
        <button class="primary" onclick="registrarGastoExtra()">Registrar en Historial</button>
    </div>
</div>

<div class="card">
    <h2>Mis Bolsillos (Saldos)</h2>
    <div id="cuentasList"></div>
</div>

<div class="card">
    <h2>Gastos Fijos Mensuales</h2>
    <div id="serviciosList"></div>
</div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; padding:25px; border-radius:20px; width:80%;">
        <h3>Confirmar Pago</h3>
        <p id="modalInfo"></p>
        <div id="modalButtons"></div>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:#888; color:white; margin-top:10px">Cancelar</button>
    </div>
</div>

<script>
    // DATA CARGADA DESDE TUS FOTOS
    const inicial = {
        ppto: 5750000,
        real: 0,
        cuentas: { "Efectivo": 320000, "Nequi": 123000, "Uber/Didi": 409000 },
        servicios: [
            { n: "Cuota Carro", v: 1165000, p: false },
            { n: "Tarjeta Nu", v: 1000000, p: false },
            { n: "Mundo Mujer", v: 330000, p: false },
            { n: "Administración", v: 220000, p: false },
            { n: "Luz", v: 138700, p: false },
            { n: "Agua", v: 95000, p: false }
        ],
        extraHistory: []
    };

    let db = JSON.parse(localStorage.getItem('jorge_finance_v5')) || inicial;
    let myChart;

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Ejecutado', 'Disponible'],
                datasets: [{
                    data: [db.real, db.ppto - db.real],
                    backgroundColor: ['#b21f1f', '#27ae60'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    function render() {
        document.getElementById('totalReal').innerText = `$${db.real.toLocaleString()}`;
        
        // Render Cuentas
        const cList = document.getElementById('cuentasList');
        cList.innerHTML = '';
        for (let c in db.cuentas) {
            cList.innerHTML += `<div class="row"><span>${c}</span><span style="font-weight:bold">$${db.cuentas[c].toLocaleString()}</span></div>`;
        }

        // Render Servicios
        const sList = document.getElementById('serviciosList');
        sList.innerHTML = '';
        db.servicios.forEach((s, i) => {
            sList.innerHTML += `
                <div class="row">
                    <span>${s.n} <br><small style="color:gray">$${s.v.toLocaleString()}</small></span>
                    <span class="badge ${s.p ? 'badge-paid' : 'badge-pending'}" onclick="abrirPago(${i})">
                        ${s.p ? 'PAGADO ✓' : 'PENDIENTE'}
                    </span>
                </div>`;
        });

        if(myChart) {
            myChart.data.datasets[0].data = [db.real, db.ppto - db.real];
            myChart.update();
        }
        localStorage.setItem('jorge_finance_v5', JSON.stringify(db));
    }

    function registrarGastoExtra() {
        const desc = document.getElementById('descGasto').value;
        const monto = parseInt(document.getElementById('montoGasto').value);
        const cuenta = document.getElementById('cuentaOrigen').value;

        if(desc && monto && db.cuentas[cuenta] >= monto) {
            db.cuentas[cuenta] -= monto;
            db.real += monto;
            db.extraHistory.push({desc, monto, fecha: new Date()});
            render();
            document.getElementById('descGasto').value = '';
            document.getElementById('montoGasto').value = '';
        } else { alert("Verifica el monto o el saldo disponible"); }
    }

    let serviceToPay = null;
    function abrirPago(idx) {
        if(db.servicios[idx].p) return;
        serviceToPay = idx;
        const m = document.getElementById('modal');
        const mInfo = document.getElementById('modalInfo');
        const mBtns = document.getElementById('modalButtons');
        
        mInfo.innerText = `Pagar ${db.servicios[idx].n} por $${db.servicios[idx].v.toLocaleString()}`;
        mBtns.innerHTML = '';
        for(let c in db.cuentas) {
            mBtns.innerHTML += `<button class="primary" onclick="confirmarPagoServicio('${c}')">Pagar con ${c}</button>`;
        }
        m.style.display = 'flex';
    }

    function confirmarPagoServicio(cuenta) {
        const monto = db.servicios[serviceToPay].v;
        if(db.cuentas[cuenta] >= monto) {
            db.cuentas[cuenta] -= monto;
            db.real += monto;
            db.servicios[serviceToPay].p = true;
            document.getElementById('modal').style.display = 'none';
            render();
        } else { alert("Saldo insuficiente en " + cuenta); }
    }

    window.onload = () => { initChart(); render(); };
</script>

</body>
</html>
