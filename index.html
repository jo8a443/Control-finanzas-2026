<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Finanzas 360</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .section-title { background: var(--primary); color: white; padding: 10px; border-radius: 8px 8px 0 0; margin-top: 20px; font-size: 1.1em; display: flex; justify-content: space-between; }
        .card { background: white; padding: 15px; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 10px; }
        
        /* Gráficas integradas */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        canvas { max-width: 100%; height: 140px !important; }

        /* Estilo de Tablas */
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-top: 10px; }
        th { background: #eee; padding: 8px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
        .row-total { background: #f9f9f9; font-weight: bold; }
        
        /* Formularios y Botones */
        .input-box { background: #eef2f3; padding: 15px; border-radius: 10px; margin-top: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-add { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-pay { background: var(--secondary); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8em; }
        .paid { background: #ccc !important; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="section-title">BALANCE GENERAL 2026</div>
<div class="card">
    <div class="dashboard">
        <canvas id="chartPresupuesto"></canvas>
        <canvas id="chartSaldos"></canvas>
    </div>
    <table>
        <tr><td>Presupuesto Inicial</td><td class="row-total">$5.750.000</td></tr>
        <tr><td>Gastos Realizados</td><td id="txtRealTotal" style="color:red">$0</td></tr>
        <tr><td>Saldo Disponible</td><td id="txtDisponible" style="color:green; font-weight:bold">$0</td></tr>
    </table>
</div>

<div class="section-title">DISPONIBLES (CUENTAS)</div>
<div class="card" id="listaCuentas">
    </div>

<div class="section-title">SEGUIMIENTO DIARIO <span>Abril</span></div>
<div class="card">
    <div style="overflow-x:auto;">
        <table id="tablaDiaria">
            <thead>
                <tr><th>Fecha</th><th>Ppto</th><th>Real</th><th>Gas</th><th>Ahorro</th></tr>
            </thead>
            <tbody id="cuerpoDiario"></tbody>
        </table>
    </div>
    <div class="input-box">
        <small>Registrar gasto del día:</small>
        <input type="date" id="d-fecha">
        <input type="number" id="d-ppto" placeholder="Presupuesto Diario">
        <input type="number" id="d-real" placeholder="Gasto Real">
        <button class="btn-add" onclick="agregarDia()">+ Agregar al Historial</button>
    </div>
</div>

<div class="section-title">GASTOS Y SERVICIOS</div>
<div class="card">
    <table id="tablaServicios">
        <thead>
            <tr><th>Descripción</th><th>Monto</th><th>Acción</th></tr>
        </thead>
        <tbody id="cuerpoServicios"></tbody>
    </table>
</div>

<script>
    // DATA CARGADA DEL EXCEL
    const inicial = {
        cuentas: { "Efectivo": 320000, "Nequi": 123000, "Daviplata": 50000, "Uber/Didi": 409000, "Caja Social": 10000 },
        servicios: [
            { n: "Cuota Carro", v: 1165000, p: false },
            { n: "Tarjeta Nu", v: 1000000, p: false },
            { n: "Mundo Mujer", v: 330000, p: false },
            { n: "Administración", v: 220000, p: false },
            { n: "Internet Leidy", v: 95000, p: false },
            { n: "Luz / Agua", v: 233700, p: false }
        ],
        diario: [
            { f: '2026-04-06', p: 150000, r: 174000, g: 39000, a: 23000 },
            { f: '2026-04-07', p: 250000, r: 191000, g: 28000, a: 17000 }
        ],
        pptoMensual: 5750000,
        realTotal: 0
    };

    let data = JSON.parse(localStorage.getItem('jorge_pro_db')) || inicial;
    let chart1, chart2;

    function render() {
        // Totales
        document.getElementById('txtRealTotal').innerText = `$${data.realTotal.toLocaleString()}`;
        document.getElementById('txtDisponible').innerText = `$${(data.pptoMensual - data.realTotal).toLocaleString()}`;

        // Cuentas
        const divC = document.getElementById('listaCuentas');
        divC.innerHTML = '';
        for (let c in data.cuentas) {
            divC.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0">
                <span>${c}</span><b>$${data.cuentas[c].toLocaleString()}</b>
            </div>`;
        }

        // Diario
        const cuerpoD = document.getElementById('cuerpoDiario');
        cuerpoD.innerHTML = '';
        data.diario.forEach(d => {
            cuerpoD.innerHTML += `<tr>
                <td>${d.f}</td><td>$${d.p}</td><td>$${d.r}</td><td>$${d.g}</td><td style="color:green">$${d.a}</td>
            </tr>`;
        });

        // Servicios
        const cuerpoS = document.getElementById('cuerpoServicios');
        cuerpoS.innerHTML = '';
        data.servicios.forEach((s, i) => {
            cuerpoS.innerHTML += `<tr>
                <td>${s.n}</td><td>$${s.v.toLocaleString()}</td>
                <td><button class="btn-pay ${s.p?'paid':''}" onclick="pagarServicio(${i})">${s.p?'OK':'Pagar'}</button></td>
            </tr>`;
        });

        actualizarGraficas();
        localStorage.setItem('jorge_pro_db', JSON.stringify(data));
    }

    function pagarServicio(i) {
        if(data.servicios[i].p) return;
        const monto = data.servicios[i].v;
        // Simulación: Paga desde Efectivo
        if(data.cuentas["Efectivo"] >= monto) {
            data.cuentas["Efectivo"] -= monto;
            data.realTotal += monto;
            data.servicios[i].p = true;
            render();
        } else { alert("Saldo insuficiente en Efectivo"); }
    }

    function agregarDia() {
        const p = parseInt(document.getElementById('d-ppto').value);
        const r = parseInt(document.getElementById('d-real').value);
        const f = document.getElementById('d-fecha').value;
        if(f && p && r) {
            data.diario.push({ f, p, r, g:0, a: (p-r) });
            data.realTotal += r;
            render();
        }
    }

    function actualizarGraficas() {
        const ctx1 = document.getElementById('chartPresupuesto').getContext('2d');
        const ctx2 = document.getElementById('chartSaldos').getContext('2d');
        if(chart1) chart1.destroy();
        if(chart2) chart2.destroy();

        chart1 = new Chart(ctx1, {
            type: 'doughnut',
            data: { labels: ['Gastado', 'Libre'], datasets: [{ data: [data.realTotal, data.pptoMensual-data.realTotal], backgroundColor: ['#b21f1f', '#27ae60'] }] },
            options: { plugins: { title: { display: true, text: 'Presupuesto' } } }
        });

        chart2 = new Chart(ctx2, {
            type: 'bar',
            data: { labels: Object.keys(data.cuentas), datasets: [{ label: 'Saldos', data: Object.values(data.cuentas), backgroundColor: '#3498db' }] },
            options: { plugins: { title: { display: true, text: 'Cuentas' } } }
        });
    }

    window.onload = render;
</script>
</body>
</html>
