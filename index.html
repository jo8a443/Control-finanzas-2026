<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF - Sistema de Gestión Financiera</title>
    <link rel="apple-touch-icon" href="https://img.icons8.com/external-flat-icons-inmotus-design/192/external-Analysis-analysis-flat-icons-inmotus-design-12.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/external-flat-icons-inmotus-design/192/external-Analysis-analysis-flat-icons-inmotus-design-12.png">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --success: #10b981; --danger: #f43f5e; --warning: #f59e0b;
            --text: #f8fafc; --text-dim: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 90px; }
        
        /* Header Profesional */
        .header { text-align: center; padding: 25px 0; border-bottom: 1px solid var(--border); margin-bottom: 25px; }
        .header img { width: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 8px var(--accent)); }
        .header h1 { margin: 0; color: #fff; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; font-weight: 900; }
        .month-selector { background: var(--card); color: var(--accent); border: 1px solid var(--accent); padding: 8px 20px; border-radius: 6px; margin-top: 12px; font-weight: bold; text-align: center; font-size: 13px; width: 180px; text-transform: uppercase; }

        /* Dashboard Ejecutivo */
        .resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .res-box { background: var(--card); padding: 14px; border-radius: 8px; border-top: 3px solid var(--accent); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .res-full { grid-column: span 2; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-top: 3px solid #fff; }
        .res-box span { display: block; font-size: 9px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; font-weight: bold; }
        .res-box strong { font-size: 18px; color: #fff; font-family: 'Roboto Mono', monospace; }

        .section-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin: 30px 0 15px 5px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        /* Cards de Datos */
        .item-card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 14px; position: relative; border: 1px solid var(--border); }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .item-title { font-size: 14px; font-weight: 700; color: #fff; }
        .item-date { font-size: 10px; color: var(--accent); font-weight: 600; }
        
        .item-body { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid var(--border); padding-top: 12px; }
        .price-tag label { display: block; font-size: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; }
        .price-tag span { font-family: 'Roboto Mono', monospace; font-weight: 600; font-size: 15px; }

        .btn-status { padding: 6px 12px; border-radius: 4px; border: none; font-weight: 800; font-size: 9px; color: white; min-width: 70px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .paid { background: var(--success); }
        .pend { background: var(--danger); }

        /* Inputs Modernos */
        .input-card { background: var(--card); padding: 18px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--accent); }
        input { width: 100%; height: 42px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: white; padding: 0 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: var(--accent); outline: none; }
        .btn-add { background: var(--accent); color: #0f172a; font-weight: 800; border: none; width: 100%; height: 42px; border-radius: 6px; font-size: 12px; text-transform: uppercase; cursor: pointer; }

        .del-btn { position: absolute; top: -10px; right: -10px; background: var(--danger); color: white; width: 22px; height: 22px; border-radius: 4px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; }

        .progress-container { width: 100%; background: var(--bg); height: 4px; border-radius: 2px; margin-top: 12px; }
        .progress-bar { height: 100%; background: var(--success); border-radius: 2px; }

        /* Navegación Inferior */
        .footer-btns { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); padding: 15px; display: flex; gap: 12px; border-top: 1px solid var(--border); box-sizing: border-box; }
        .f-btn { flex: 1; height: 45px; border-radius: 6px; border: none; font-weight: 800; color: white; font-size: 11px; text-transform: uppercase; cursor: pointer; }
        .footer-brand { text-align: center; padding: 25px; opacity: 0.3; font-size: 8px; letter-spacing: 2px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://img.icons8.com/external-flat-icons-inmotus-design/192/external-Analysis-analysis-flat-icons-inmotus-design-12.png" alt="Logo">
        <h1>SISTEMA DE GESTIÓN</h1>
        <input type="text" id="mes-actual" class="month-selector" value="MAYO 2026" oninput="save()">
    </div>

    <div class="resumen-grid">
        <div class="res-box res-full">
            <span>DISPONIBILIDAD TOTAL EN ACTIVOS</span>
            <strong id="res-cuentas" style="font-size: 22px; color: var(--accent)">$ 0</strong>
        </div>
        <div class="res-box" style="border-color: var(--success)">
            <span>INGRESOS BRUTOS</span>
            <strong id="res-ing">$ 0</strong>
        </div>
        <div class="res-box" style="border-color: var(--danger)">
            <span>EGRESOS REALES</span>
            <strong id="res-gas">$ 0</strong>
        </div>
        <div class="res-box" style="border-color: var(--warning)">
            <span>FONDO DE RESERVA</span>
            <strong id="res-aho">$ 0</strong>
        </div>
        <div class="res-box" style="border-color: #fff">
            <span>BALANCE NETO</span>
            <strong id="res-dif">$ 0</strong>
        </div>
    </div>

    <div class="section-title">1. Gestión de Capital</div>
    <div id="list-disp"></div>
    <div class="input-card">
        <input type="text" id="d-n" placeholder="Cuenta o Activo">
        <input type="number" id="d-v" placeholder="Saldo $">
        <button class="btn-add" onclick="addDisp()">+ Añadir Activo</button>
    </div>

    <div class="section-title">2. Registro de Egresos</div>
    <div id="list-gastos"></div>
    <div class="input-card">
        <input type="date" id="g-f">
        <input type="text" id="g-n" placeholder="Concepto de operación">
        <div style="display:flex; gap:10px">
            <input type="number" id="g-p" placeholder="Ppto $">
            <input type="number" id="g-r" placeholder="Real $">
        </div>
        <button class="btn-add" onclick="addGasto()">+ Registrar Movimiento</button>
    </div>

    <div class="section-title">3. Reporte de Rendimiento</div>
    <div id="list-diario"></div>
    <div class="input-card">
        <input type="date" id="i-f">
        <div style="display:flex; gap:10px">
            <input type="number" id="i-m" placeholder="Meta $">
            <input type="number" id="i-i" placeholder="Ingreso $">
        </div>
        <div style="display:flex; gap:10px">
            <input type="number" id="i-a" placeholder="Reserva $">
            <input type="number" id="i-c" placeholder="Gastos Op $">
        </div>
        <button class="btn-add" onclick="addDiario()">+ Cerrar Reporte Diario</button>
    </div>

    <div class="footer-brand">ASSET MANAGEMENT SYSTEM V4.0</div>

    <div class="footer-btns">
        <button class="f-btn" style="background: #0f172a; border: 1px solid var(--border)" onclick="exportar()">Generar CSV</button>
        <button class="f-btn" style="background: var(--success); color: #000" onclick="save(true)">Sincronizar</button>
    </div>

<script>
    const fmt = n => '$' + Number(n).toLocaleString('es-CO');
    
    function save(msg = false) {
        const data = {
            mes: document.getElementById('mes-actual').value,
            disp: Array.from(document.querySelectorAll('.card-disp')).map(c => c.dataset),
            gastos: Array.from(document.querySelectorAll('.card-gasto')).map(c => ({...c.dataset, est: c.querySelector('.btn-status').innerText})),
            diario: Array.from(document.querySelectorAll('.card-diario')).map(c => c.dataset)
        };
        localStorage.setItem('db_enterprise_2026', JSON.stringify(data));
        if(msg) alert("Base de datos actualizada localmente.");
        calc();
    }

    window.onload = () => {
        const db = JSON.parse(localStorage.getItem('db_enterprise_2026'));
        if(db) {
            document.getElementById('mes-actual').value = db.mes || "PERIODO 2026";
            db.disp.forEach(d => renderDisp(d));
            db.gastos.forEach(g => renderGasto(g));
            db.diario.forEach(d => renderDiario(d));
            calc();
        }
    };

    function addDisp() {
        const n = document.getElementById('d-n').value, v = document.getElementById('d-v').value;
        if(!n || !v) return;
        renderDisp({item: n, valor: v});
        document.getElementById('d-n').value = ''; document.getElementById('d-v').value = '';
        save();
    }

    function renderDisp(d) {
        const html = `
        <div class="item-card card-disp" data-item="${d.item}" data-valor="${d.valor}">
            <button class="del-btn" onclick="this.parentElement.remove();save();">×</button>
            <div class="item-header"><div class="item-title">${d.item}</div></div>
            <div class="item-body">
                <div class="price-tag"><label>Fondos Disponibles</label><span style="color:var(--accent)">${fmt(d.valor)}</span></div>
            </div>
        </div>`;
        document.getElementById('list-disp').insertAdjacentHTML('beforeend', html);
    }

    function addGasto() {
        const f = document.getElementById('g-f').value, n = document.getElementById('g-n').value, p = document.getElementById('g-p').value, r = document.getElementById('g-r').value || 0;
        if(!f || !n || !p) return;
        renderGasto({fecha: f, item: n, ppto: p, real: r, est: 'PEND'});
        document.getElementById('g-n').value = ''; document.getElementById('g-p').value = ''; document.getElementById('g-r').value = '';
        save();
    }

    function renderGasto(g) {
        const cl = g.est === 'PAGO' ? 'paid' : 'pend';
        const html = `
        <div class="item-card card-gasto" data-fecha="${g.fecha}" data-item="${g.item}" data-ppto="${g.ppto}" data-real="${g.real}">
            <button class="del-btn" onclick="this.parentElement.remove();save();">×</button>
            <div class="item-header">
                <div class="item-title">${g.item}</div>
                <div class="item-date">${g.fecha.split('-').reverse().join('/')}</div>
            </div>
            <div class="item-body">
                <div class="price-tag"><label>Proyectado</label><span>${fmt(g.ppto)}</span></div>
                <div class="price-tag"><label>Ejecutado</label><span>${fmt(g.real)}</span></div>
                <button class="btn-status ${cl}" onclick="toggleG(this)">${g.est}</button>
            </div>
        </div>`;
        document.getElementById('list-gastos').insertAdjacentHTML('beforeend', html);
    }

    function toggleG(b) {
        b.innerText = b.innerText === 'PEND' ? 'PAGO' : 'PEND';
        b.className = `btn-status ${b.innerText === 'PAGO' ? 'paid' : 'pend'}`;
        save();
    }

    function addDiario() {
        const f = document.getElementById('i-f').value, m = document.getElementById('i-m').value, i = document.getElementById('i-i').value, a = document.getElementById('i-a').value || 0, c = document.getElementById('i-c').value || 0;
        if(!f || !m || !i) return;
        renderDiario({fecha: f, meta: m, ing: i, aho: a, comb: c});
        document.getElementById('i-m').value = ''; document.getElementById('i-i').value = ''; document.getElementById('i-a').value = ''; document.getElementById('i-c').value = '';
        save();
    }

    function renderDiario(d) {
        const perc = Math.min((d.ing / d.meta) * 100, 100);
        const html = `
        <div class="item-card card-diario" data-fecha="${d.fecha}" data-meta="${d.meta}" data-ing="${d.ing}" data-aho="${d.aho}" data-comb="${d.comb}">
            <button class="del-btn" onclick="this.parentElement.remove();save();">×</button>
            <div class="item-header">
                <div class="item-title">Balance Operativo</div>
                <div class="item-date">${d.fecha.split('-').reverse().join('/')}</div>
            </div>
            <div class="item-body">
                <div class="price-tag"><label>Objetivo</label><span>${fmt(d.meta)}</span></div>
                <div class="price-tag"><label>Real</label><span style="color:var(--success)">${fmt(d.ing)}</span></div>
                <div class="price-tag"><label>Reserva</label><span>${fmt(d.aho)}</span></div>
            </div>
            <div class="progress-container"><div class="progress-bar" style="width: ${perc}%"></div></div>
        </div>`;
        document.getElementById('list-diario').insertAdjacentHTML('beforeend', html);
    }

    function calc() {
        let ingMes = 0, gasMes = 0, ahoMes = 0, totalDisp = 0;
        document.querySelectorAll('.card-disp').forEach(c => totalDisp += Number(c.dataset.valor));
        document.querySelectorAll('.card-gasto').forEach(c => gasMes += Number(c.dataset.real));
        document.querySelectorAll('.card-diario').forEach(c => { ingMes += Number(c.dataset.ing); ahoMes += Number(c.dataset.aho); });

        document.getElementById('res-cuentas').innerText = fmt(totalDisp);
        document.getElementById('res-ing').innerText = fmt(ingMes);
        document.getElementById('res-gas').innerText = fmt(gasMes);
        document.getElementById('res-aho').innerText = fmt(ahoMes);

        const resFinal = totalDisp + ingMes - gasMes + ahoMes;
        const divDif = document.getElementById('res-dif');
        divDif.innerText = fmt(resFinal);
        divDif.style.color = resFinal < 0 ? 'var(--danger)' : 'var(--success)';
    }

    function exportar() {
        const mes = document.getElementById('mes-actual').value;
        let csv = "\ufeffREPORTE FINANCIERO CORPORATIVO - " + mes + "\n\n";
        csv += "1. ACTIVOS\nCuenta,Saldo\n";
        document.querySelectorAll('.card-disp').forEach(c => { csv += `${c.dataset.item},${c.dataset.valor}\n`; });
        csv += "\n2. EGRESOS\nConcepto,Fecha,Proyectado,Ejecutado,Estado\n";
        document.querySelectorAll('.card-gasto').forEach(c => { csv += `${c.dataset.item},${c.dataset.fecha},${c.dataset.ppto},${c.dataset.real},${c.querySelector('.btn-status').innerText}\n`; });
        const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `Reporte_${mes}.csv`; a.click();
    }
</script>
</body>
</html>
