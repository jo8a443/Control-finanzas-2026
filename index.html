<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Financiero - Jorge 2026</title>
    <style>
        :root { 
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --header-blue: #1a2a6c;
            --silver: #b0b0b0;
            --text-main: #e0e0e0;
            --accent-blue: #00d4ff;
            --danger: #ff4d4d;
            --success: #00e676;
            --border-silver: #444;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main);
            margin: 0; 
            padding: 10px; 
            padding-bottom: 50px; 
        }

        .main-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-silver);
        }
        .main-header h1 { 
            margin: 0; 
            color: var(--accent-blue); 
            font-size: 20px; 
            text-transform: uppercase; 
        }
        .month-input {
            background: #333;
            color: white;
            border: 1px solid var(--border-silver);
            padding: 4px 10px;
            border-radius: 4px;
            margin-top: 8px;
            font-weight: bold;
            text-align: center;
        }
        
        .card { 
            background: var(--bg-card); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 25px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
            border: 1px solid var(--border-silver); 
            overflow: hidden; /* Evita scroll lateral */
        }

        .card-header { 
            background: linear-gradient(90deg, var(--header-blue), #003366);
            color: white; 
            margin: -15px -15px 15px -15px; 
            padding: 10px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 13px; 
            text-transform: uppercase; 
            border-radius: 12px 12px 0 0;
            border-bottom: 2px solid var(--silver);
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
        th { background: #2c2c2c; color: var(--silver); border-bottom: 1px solid var(--border-silver); padding: 6px 4px; text-align: left; }
        td { border-bottom: 1px solid #333; padding: 10px 4px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .val { text-align: right; font-weight: bold; font-family: 'Consolas', monospace; color: white; }

        .input-group { 
            background: #252525; 
            padding: 12px; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            margin-top: 15px;
        }

        input { 
            height: 40px; 
            padding: 0 12px; 
            background: #333;
            border: 1px solid var(--border-silver); 
            border-radius: 6px; 
            font-size: 14px; 
            color: white;
            width: 100%;
            box-sizing: border-box;
        }

        .add-btn { 
            height: 40px; 
            background: var(--header-blue); 
            color: white; 
            border: 1px solid var(--accent-blue); 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer;
        }

        .export-btn {
            background: var(--success);
            color: #121212;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 20px;
        }
        
        .delete-btn { 
            background: rgba(255, 77, 77, 0.2); 
            color: var(--danger); 
            border: 1px solid var(--danger); 
            padding: 4px 6px; 
            border-radius: 4px; 
            font-size: 10px;
        }

        .total-row { background: #2a2a2a; color: white; }

        /* Ajuste específico Campo 5 para no scroll */
        .col-fecha { width: 22%; }
        .col-ppto { width: 18%; }
        .col-real { width: 18%; }
        .col-gas { width: 16%; }
        .col-ahorro { width: 16%; }
        .col-x { width: 10%; }

        .footer-logo {
            text-align: center;
            margin-top: 30px;
            padding-bottom: 20px;
        }
        .footer-logo p { font-size: 9px; color: var(--silver); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .footer-logo img { height: 50px; filter: drop-shadow(0 0 5px rgba(0,212,255,0.2)); }
    </style>
</head>
<body>

    <div class="main-header">
        <h1>Control Financiero</h1>
        <input type="text" class="month-input" value="ABRIL 2026">
    </div>

    <div class="card">
        <div class="card-header">1. Resumen Ejecutivo</div>
        <table>
            <tr><td>INGRESOS TOTALES</td><td class="val" id="res-ingresos" style="color: var(--accent-blue);">$ 0</td></tr>
            <tr><td>GASTOS MENSUALES</td><td class="val" id="res-gastos" style="color: var(--danger);">$ 0</td></tr>
            <tr style="background: rgba(0, 230, 118, 0.05);">
                <td>AHORRO TOTAL</td>
                <td class="val" id="res-ahorro" style="color: var(--success);">$ 0</td>
            </tr>
            <tr class="total-row">
                <td style="padding: 12px 4px; font-weight: bold;">DIFERENCIA FINAL</td>
                <td class="val" id="res-diferencia" style="font-size: 1.1em;">$ 0</td>
            </tr>
        </table>
    </div>

    <div class="card">
        <div class="card-header">5. Seguimiento Diario</div>
        <table id="t-diario">
            <thead>
                <tr>
                    <th class="col-fecha">Fecha</th>
                    <th class="col-ppto">Ppto</th>
                    <th class="col-real">Real</th>
                    <th class="col-gas">Gas</th>
                    <th class="col-ahorro">Aho.</th>
                    <th class="col-x">X</th>
                </tr>
            </thead>
            <tbody id="body-diario">
                </tbody>
        </table>
        <div class="input-group">
            <input type="date" id="in-di-f">
            <div style="display: flex; gap: 5px;">
                <input type="number" id="in-di-p" placeholder="Ppto $">
                <input type="number" id="in-di-r" placeholder="Real $">
            </div>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="in-di-g" placeholder="Gasolina $">
                <input type="number" id="in-di-a" placeholder="Ahorro $">
            </div>
            <button class="add-btn" onclick="addDiario()">+ Registrar Día</button>
        </div>
    </div>

    <button class="export-btn" onclick="exportarExcel()">📥 EXPORTAR A EXCEL</button>

    <div class="footer-logo">
        <p>Desarrollado por:</p>
        <img src="https://i.ibb.co/Lztv5zM/logo-gestion.png" alt="Gestión & Crecimiento Co.">
    </div>

<script>
    function fmt(n) { return '$' + Number(n).toLocaleString('es-CO'); }
    function del(btn) { btn.closest('tr').remove(); recalcularTodo(); }

    function recalcularTodo() {
        let ingresos = 0, ahorro = 0;
        document.querySelectorAll('#body-diario tr').forEach(row => {
            ingresos += Number(row.getAttribute('data-ppto')) || 0;
            ahorro += Number(row.getAttribute('data-ahorro')) || 0;
        });
        // Aquí podrías sumar gastos de otras secciones si las incluyes
        const diferencia = ingresos + ahorro;
        document.getElementById('res-ingresos').innerText = fmt(ingresos);
        document.getElementById('res-ahorro').innerText = fmt(ahorro);
        document.getElementById('res-diferencia').innerText = fmt(diferencia);
        document.getElementById('res-diferencia').style.color = diferencia < 0 ? 'var(--danger)' : 'var(--success)';
    }

    function addDiario() {
        const f = document.getElementById('in-di-f').value;
        const p = document.getElementById('in-di-p').value;
        const r = document.getElementById('in-di-r').value;
        const g = document.getElementById('in-di-g').value || 0;
        const a = document.getElementById('in-di-a').value || 0;
        if(!f || !p) return;
        
        const shortDate = f.split('-').slice(1).reverse().join('/'); // DD/MM
        
        const row = document.createElement('tr');
        row.setAttribute('data-ppto', p);
        row.setAttribute('data-ahorro', a);
        row.innerHTML = `
            <td>${shortDate}</td>
            <td class="val">${Number(p/1000)}k</td>
            <td class="val">${Number(r/1000)}k</td>
            <td class="val">${Number(g/1000)}k</td>
            <td class="val">${Number(a/1000)}k</td>
            <td><button class="delete-btn" onclick="del(this)">X</button></td>`;
        document.getElementById('body-diario').appendChild(row);
        recalcularTodo();
        ['in-di-f','in-di-p','in-di-r','in-di-g','in-di-a'].forEach(id => document.getElementById(id).value = "");
    }

    function exportarExcel() {
        let csv = "Fecha;Presupuesto;Real;Gasolina;Ahorro\n";
        document.querySelectorAll("#body-diario tr").forEach(tr => {
            const cells = tr.cells;
            csv += `${cells[0].innerText};${cells[1].innerText};${cells[2].innerText};${cells[3].innerText};${cells[4].innerText}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Finanzas_Jorge.csv";
        link.click();
    }
</script>
</body>
</html>
