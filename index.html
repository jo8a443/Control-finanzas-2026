<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G&C Suite Executive V6.5</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2845/2845862.png">
    
    <style>
        :root {
            --bg: #0b0f1a; --card: #161d2f; --accent: #38bdf8;
            --success: #10b981; --danger: #f43f5e; --warning: #fbbf24;
            --fuel: #ea580c; --text: #f8fafc; --text-dim: #94a3b8; --border: #2d3748;
            --bank: #a855f7;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .header { 
            background: linear-gradient(180deg, #161d2f 0%, #0b0f1a 100%); 
            padding: 20px; text-align: center; border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { margin: 0; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; font-weight: 900; color: #fff; }
        .header .sub { font-size: 9px; color: var(--accent); letter-spacing: 3px; font-weight: bold; }

        .tab-content { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
        .active-tab { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .exec-card { background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .main-balance { text-align: center; margin-bottom: 25px; }
        .main-balance span { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .main-balance h2 { font-size: 32px; margin: 10px 0; font-family: 'Roboto Mono', monospace; color: var(--accent); }

        .chart-container { position: relative; width: 140px; height: 140px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; }
        .donut-chart { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#1e293b 0% 100%); display: flex; align-items: center; justify-content: center; transition: all 0.5s ease; }
        .donut-inner { width: 75%; height: 75%; background: var(--card); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .metric-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 16px; border-left: 3px solid var(--border); }
        .metric-item span { display: block; font-size: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .metric-item strong { font-size: 13px; font-family: 'Roboto Mono', monospace; }

        .progress-container { margin: 10px 0; }
        .progress-label { display: flex; justify-content: space-between; font-size: 9px; text-transform: uppercase; margin-bottom: 4px; color: var(--text-dim); }
        .progress-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; }
        .progress-bar-fill { height: 100%; transition: width 0.8s ease; }

        .item-card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .input-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px dashed var(--accent); margin-top: 20px; }
        input { width: 100%; height: 45px; margin-top: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: #fff; padding: 0 15px; box-sizing: border-box; font-size: 14px; }
        .btn-add { background: var(--accent); color: #000; font-weight: 900; border: none; width: 100%; height: 45px; border-radius: 10px; margin-top: 15px; font-size: 11px; text-transform: uppercase; cursor: pointer; }
        .btn-del { background: var(--danger); color: white; border: none; border-radius: 6px; padding: 4px 8px; font-size: 10px; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--accent); z-index: 1000; padding-bottom: 10px; }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 8px; text-transform: uppercase; font-weight: 800; flex: 1; cursor: pointer; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 5px; }
        .nav-item.active { color: var(--accent); }

        .section-title { font-size: 12px; color: var(--accent); margin: 20px 0 10px; font-weight: 800; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>GESTIÓN & CRECIMIENTO CO.</h1>
        <div class="sub">FLEET & PERFORMANCE V6.5</div>
    </div>

    <!-- TAB 1: RESUMEN -->
    <div id="tab1" class="tab-content active-tab">
        <div class="exec-card">
            <div class="main-balance">
                <span>Utilidad (Ingresos - Gastos Fijos)</span>
                <h2 id="res-dif">$ 0</h2>
            </div>
            <div class="chart-container">
                <div class="donut-chart" id="mainChart">
                    <div class="donut-inner"><strong id="chart-perc" style="font-size: 12px;">0% Lib</strong></div>
                </div>
            </div>
            <div class="metrics-grid">
                <div class="metric-item" style="border-color: var(--success)">
                    <span>Ingresos Totales</span><strong id="res-ing" style="color: var(--success)">$ 0</strong>
                </div>
                <div class="metric-item" style="border-color: var(--danger)">
                    <span>Gastos Fijos</span><strong id="res-gas" style="color: var(--danger)">$ 0</strong>
                </div>
                <div class="metric-item" style="border-color: var(--warning)">
                    <span>Total Ahorros</span><strong id="res-aho" style="color: var(--warning)">$ 0</strong>
                </div>
                <div class="metric-item" style="border-color: var(--fuel)">
                    <span>⛽ Combustible</span><strong id="res-fuel" style="color: var(--fuel)">$ 0</strong>
                </div>
                <div class="metric-item" style="border-color: #fff; grid-column: span 2;">
                    <span>Efectivo Disponible</span><strong id="res-cuentas">$ 0</strong>
                </div>
            </div>
        </div>
        <div id="list-disp"></div>
        <div class="input-card">
            <input type="text" id="d-n" placeholder="Nombre (Ej: Nequi, Caja)">
            <input type="number" id="d-v" placeholder="Saldo Actual $">
            <button class="btn-add" onclick="addDisp()">+ Guardar Saldo</button>
        </div>
    </div>

    <!-- TAB 2: GASTOS -->
    <div id="tab2" class="tab-content">
        <div id="list-gastos"></div>
        <div class="input-card">
            <input type="date" id="g-f">
            <input type="text" id="g-n" placeholder="Concepto (Ej: Arriendo)">
            <div style="display:flex; gap:10px">
                <input type="number" id="g-p" placeholder="Ppto $">
                <input type="number" id="g-r" placeholder="Real $">
            </div>
            <button class="btn-add" onclick="addGasto()">+ Ejecutar Egreso</button>
        </div>
    </div>

    <!-- TAB 3: DIARIO -->
    <div id="tab3" class="tab-content">
        <div id="list-diario"></div>
        <div class="input-card">
            <input type="date" id="i-f">
            <div style="display:flex; gap:10px">
                <input type="number" id="i-m" placeholder="Meta Diaria $">
                <input type="number" id="i-i" placeholder="Ingreso Logrado $">
            </div>
            <div style="display:flex; gap:10px">
                <input type="number" id="i-a" placeholder="Ahorro Día $">
                <input type="number" id="i-c" placeholder="Combustible $">
            </div>
            <button class="btn-add" onclick="addDiario()">+ Registrar Cierre de Jornada</button>
        </div>
    </div>

    <!-- TAB 4: CRÉDITOS (NUEVA) -->
    <div id="tab4" class="tab-content">
        <div class="section-title">Préstamos Bancarios</div>
        <div id="list-bancos"></div>
        
        <div class="input-card" style="border-color: var(--bank)">
            <input type="text" id="b-nom" placeholder="Nombre del Banco">
            <input type="text" id="b-num" placeholder="Número de Crédito">
            <div style="display:flex; gap:10px">
                <input type="number" id="b-ini" placeholder="Crédito Inicial $">
                <input type="number" id="b-cuo" placeholder="Valor Cuota $">
            </div>
            <div style="display:flex; gap:10px">
                <input type="number" id="b-total-c" placeholder="N° Cuotas">
                <input type="date" id="b-fec">
            </div>
            <button class="btn-add" style="background: var(--bank); color:white" onclick="addBanco()">+ Registrar Préstamo</button>
        </div>

        <div class="section-title">Tarjetas de Crédito</div>
        <div id="list-tarjetas"></div>

        <div class="input-card" style="border-color: var(--warning)">
            <input type="text" id="t-nom" placeholder="Nombre de la Tarjeta">
            <input type="text" id="t-con" placeholder="Concepto de la compra">
            <div style="display:flex; gap:10px">
                <input type="number" id="t-cup" placeholder="Cupo inicial $">
                <input type="number" id="t-val" placeholder="Valor compra $">
            </div>
            <div style="display:flex; gap:10px">
                <input type="number" id="t-cuo" placeholder="Número de cuotas">
                <input type="date" id="t-fec">
            </div>
            <button class="btn-add" style="background: var(--warning); color:black" onclick="addTarjeta()">+ Registrar Compra TC</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab(1, this)"><i>📊</i>RESUMEN</div>
        <div class="nav-item" onclick="showTab(2, this)"><i>💸</i>EGRESOS</div>
        <div class="nav-item" onclick="showTab(3, this)"><i>🚀</i>DIARIO</div>
        <div class="nav-item" onclick="showTab(4, this)"><i>💳</i>CRÉDITOS</div>
    </div>

    <script>
        const KEY = 'DB_GC_V65_FINAL';
        const fmt = n => '$' + Number(n).toLocaleString('es-CO');

        function showTab(num, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab' + num).classList.add('active-tab');
            el.classList.add('active');
        }

        function save() {
            const data = {
                disp: Array.from(document.querySelectorAll('.card-disp')).map(c => c.dataset),
                gastos: Array.from(document.querySelectorAll('.card-gasto')).map(c => c.dataset),
                diario: Array.from(document.querySelectorAll('.card-diario')).map(c => c.dataset),
                bancos: Array.from(document.querySelectorAll('.card-banco')).map(c => c.dataset),
                tarjetas: Array.from(document.querySelectorAll('.card-tarjeta')).map(c => c.dataset)
            };
            localStorage.setItem(KEY, JSON.stringify(data));
            calc();
        }

        window.onload = () => {
            const db = JSON.parse(localStorage.getItem(KEY));
            if(db) {
                db.disp.forEach(d => renderDisp(d));
                db.gastos.forEach(g => renderGasto(g));
                db.diario.forEach(d => renderDiario(d));
                if(db.bancos) db.bancos.forEach(b => renderBanco(b));
                if(db.tarjetas) db.tarjetas.forEach(t => renderTarjeta(t));
                calc();
            }
        };

        // --- FUNCIONES EXISTENTES (SIN CAMBIOS) ---
        function addDisp() {
            const n = document.getElementById('d-n').value, v = document.getElementById('d-v').value;
            if(!n || !v) return;
            renderDisp({item: n, valor: v});
            save();
            document.getElementById('d-n').value = ''; document.getElementById('d-v').value = '';
        }
        function renderDisp(d) {
            const html = `<div class="item-card card-disp" data-item="${d.item}" data-valor="${d.valor}" style="display:flex; justify-content:space-between; align-items:center">
                <span>${d.item}</span><div style="display:flex; align-items:center; gap:10px"><strong>${fmt(d.valor)}</strong>
                <button class="btn-del" onclick="this.parentElement.parentElement.remove();save();">×</button></div></div>`;
            document.getElementById('list-disp').insertAdjacentHTML('beforeend', html);
        }
        function addGasto() {
            const f = document.getElementById('g-f').value, n = document.getElementById('g-n').value, p = document.getElementById('g-p').value, r = document.getElementById('g-r').value;
            if(!f || !n || !p || !r) return;
            renderGasto({fecha: f, item: n, ppto: p, real: r});
            save();
            document.getElementById('g-n').value = ''; document.getElementById('g-p').value = ''; document.getElementById('g-r').value = '';
        }
        function renderGasto(g) {
            const p = Number(g.ppto), r = Number(g.real);
            const por = p > 0 ? Math.min((r / p) * 100, 100) : 0;
            let col = 'var(--success)'; if(por > 85) col = 'var(--warning)'; if(r > p) col = 'var(--danger)';
            const html = `<div class="item-card card-gasto" data-fecha="${g.fecha}" data-item="${g.item}" data-ppto="${g.ppto}" data-real="${g.real}">
                <div style="display:flex; justify-content:space-between"><span>${g.item} (${g.fecha})</span><button class="btn-del" onclick="this.parentElement.parentElement.remove();save();">×</button></div>
                <div class="progress-container"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${por}%; background:${col}"></div></div></div>
                <div style="display:flex; justify-content:space-between; font-size:12px"><span>Ppto: ${fmt(p)}</span><strong>Real: ${fmt(r)}</strong></div></div>`;
            document.getElementById('list-gastos').insertAdjacentHTML('beforeend', html);
        }
        function addDiario() {
            const f = document.getElementById('i-f').value, m = document.getElementById('i-m').value, i = document.getElementById('i-i').value, a = document.getElementById('i-a').value || 0, c = document.getElementById('i-c').value || 0;
            if(!f || !m || !i) return;
            renderDiario({fecha: f, meta: m, ing: i, aho: a, fuel: c});
            save();
            document.getElementById('i-i').value = ''; document.getElementById('i-a').value = ''; document.getElementById('i-c').value = '';
        }
        function renderDiario(d) {
            const meta = Number(d.meta), ing = Number(d.ing), fuel = Number(d.fuel), aho = Number(d.aho);
            const porMeta = meta > 0 ? Math.min((ing / meta) * 100, 100) : 0;
            const porFuel = ing > 0 ? Math.min((fuel / ing) * 100, 100) : 0;
            const porAho = ing > 0 ? Math.min((aho / ing) * 100, 100) : 0;
            const html = `<div class="item-card card-diario" data-fecha="${d.fecha}" data-meta="${d.meta}" data-ing="${d.ing}" data-aho="${d.aho}" data-fuel="${d.fuel}">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><strong style="color:var(--accent)">Jornada: ${d.fecha}</strong><button class="btn-del" onclick="this.parentElement.parentElement.remove();save();">×</button></div>
                <div class="progress-container"><div class="progress-label"><span>Cumplimiento Meta</span><span>${porMeta.toFixed(0)}%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${porMeta}%; background:linear-gradient(90deg, var(--accent), var(--success))"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:11px; margin-top:4px"><span>Ingreso: <b>${fmt(ing)}</b></span><span>Meta: ${fmt(meta)}</span></div></div>
                <div class="progress-container" style="margin-top:15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top:10px;"><div class="progress-label"><span>Distribución Ingreso</span></div><div class="progress-bar-bg" style="display:flex;"><div style="width:${porFuel}%; background:var(--fuel); height:100%"></div><div style="width:${porAho}%; background:var(--warning); height:100%"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:11px; margin-top:4px"><span style="color:var(--fuel)">⛽ Fuel: ${fmt(fuel)}</span><span style="color:var(--warning)">💰 Ahorro: ${fmt(aho)}</span></div></div></div>`;
            document.getElementById('list-diario').insertAdjacentHTML('beforeend', html);
        }

        // --- NUEVAS FUNCIONES PESTAÑA 4 ---

        function addBanco() {
            const obj = {
                banco: document.getElementById('b-nom').value,
                num: document.getElementById('b-num').value,
                inicial: document.getElementById('b-ini').value,
                cuota: document.getElementById('b-cuo').value,
                ncuotas: document.getElementById('b-total-c').value,
                fecha: document.getElementById('b-fec').value
            };
            if(!obj.banco || !obj.inicial) return;
            renderBanco(obj);
            save();
            ['b-nom', 'b-num', 'b-ini', 'b-cuo', 'b-total-c', 'b-fec'].forEach(id => document.getElementById(id).value = '');
        }

        function renderBanco(b) {
            const html = `<div class="item-card card-banco" data-banco="${b.banco}" data-num="${b.num}" data-inicial="${b.inicial}" data-cuota="${b.cuota}" data-ncuotas="${b.ncuotas}" data-fecha="${b.fecha}">
                <div style="display:flex; justify-content:space-between"><strong style="color:var(--bank)">${b.banco}</strong><button class="btn-del" onclick="this.parentElement.parentElement.remove();save();">×</button></div>
                <div style="font-size:11px; margin-top:5px; color:var(--text-dim)">Crédito N°: ${b.num || 'N/A'}</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; font-size:12px">
                    <div><span>Inicia:</span><br><strong>${fmt(b.inicial)}</strong></div>
                    <div><span>Cuota:</span><br><strong>${fmt(b.cuota)}</strong></div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:11px; border-top:1px solid var(--border); padding-top:5px">
                    <span>${b.ncuotas} Meses</span><span>Pago: ${b.fecha}</span>
                </div></div>`;
            document.getElementById('list-bancos').insertAdjacentHTML('beforeend', html);
        }

        function addTarjeta() {
            const obj = {
                nom: document.getElementById('t-nom').value,
                con: document.getElementById('t-con').value,
                cupo: document.getElementById('t-cup').value,
                val: document.getElementById('t-val').value,
                cuo: document.getElementById('t-cuo').value,
                fec: document.getElementById('t-fec').value
            };
            if(!obj.nom || !obj.val) return;
            renderTarjeta(obj);
            save();
            ['t-nom', 't-con', 't-cup', 't-val', 't-cuo', 't-fec'].forEach(id => document.getElementById(id).value = '');
        }

        function renderTarjeta(t) {
            const html = `<div class="item-card card-tarjeta" data-nom="${t.nom}" data-con="${t.con}" data-cupo="${t.cupo}" data-val="${t.val}" data-cuo="${t.cuo}" data-fec="${t.fec}">
                <div style="display:flex; justify-content:space-between"><strong style="color:var(--warning)">${t.nom}</strong><button class="btn-del" onclick="this.parentElement.parentElement.remove();save();">×</button></div>
                <div style="font-size:11px; margin:5px 0; font-style:italic">${t.con}</div>
                <div class="progress-container">
                    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${(t.val/t.cupo)*100}%; background:var(--warning)"></div></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:12px">
                    <div><span>Compra:</span><br><strong>${fmt(t.val)}</strong></div>
                    <div><span>Cupo:</span><br><strong>${fmt(t.cupo)}</strong></div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:11px">
                    <span>${t.cuo} Cuotas</span><span>Límite: ${t.fec}</span>
                </div></div>`;
            document.getElementById('list-tarjetas').insertAdjacentHTML('beforeend', html);
        }

        function calc() {
            let tIng = 0, tGas = 0, tFuel = 0, tAho = 0, tCap = 0;
            document.querySelectorAll('.card-disp').forEach(c => tCap += Number(c.dataset.valor));
            document.querySelectorAll('.card-gasto').forEach(c => tGas += Number(c.dataset.real));
            document.querySelectorAll('.card-diario').forEach(c => { 
                tIng += Number(c.dataset.ing); 
                tFuel += Number(c.dataset.fuel); 
                tAho += Number(c.dataset.aho);
            });
            const util = tIng - tGas;
            document.getElementById('res-ing').innerText = fmt(tIng);
            document.getElementById('res-gas').innerText = fmt(tGas);
            document.getElementById('res-aho').innerText = fmt(tAho);
            document.getElementById('res-fuel').innerText = fmt(tFuel);
            document.getElementById('res-dif').innerText = fmt(util);
            document.getElementById('res-cuentas').innerText = fmt(tCap);
            if(tIng > 0) {
                const pG = Math.min((tGas/tIng)*100, 100);
                document.getElementById('mainChart').style.background = `conic-gradient(var(--danger) 0% ${pG}%, var(--success) ${pG}% 100%)`;
                document.getElementById('chart-perc').innerText = Math.round(100 - pG) + "% Lib";
            }
        }
    </script>
</body>
</html>
