<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Jorge 2026</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 50px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); font-size: 1.1em; border-left: 4px solid var(--accent); padding-left: 10px; margin: 0 0 15px 0; background: #eef2f3; padding: 5px 10px; }
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { padding: 12px; background: #ebf5fb; border-radius: 8px; text-align: center; }
        .stat label { font-size: 0.7em; color: #555; display: block; text-transform: uppercase; }
        .stat b { font-size: 1.1em; color: var(--accent); }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; font-size: 0.9em; }
        .amount { font-weight: bold; color: var(--primary); }
        .status-pill { padding: 5px 10px; border-radius: 20px; font-size: 0.7em; cursor: pointer; font-weight: bold; border: 1px solid; }
        .pending { background: #fff5f5; color: var(--danger); border-color: var(--danger); }
        .paid { background: #e9f7ef; color: var(--success); border-color: var(--success); }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 320px; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2>Balance General</h2>
    <div class="balance-grid">
        <div class="stat"><label>Ppto Mensual</label><b>$5,750,000</b></div>
        <div class="stat"><label>Real Pagado</label><b id="txtReal" style="color: var(--danger)">$0</b></div>
    </div>
</div>

<div class="card">
    <h2>Disponible (Cuentas)</h2>
    <div id="listaCuentas"></div>
</div>

<div class="card">
    <h2>Gastos Mensuales</h2>
    <div id="listaServicios"></div>
</div>

<div class="card">
    <h2>Cuentas por Pagar (Extras)</h2>
    <div id="listaExtras"></div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">¿Origen del pago?</h3>
        <div id="opcionesCuenta"></div>
        <button onclick="cerrarModal()" style="background:#888; width:100%; color:white; border:none; padding:10px; border-radius:8px; margin-top:10px">Cancelar</button>
    </div>
</div>

<script>
    const inicial = {
        cuentas: { "Efectivo": 320000, "Nequi": 123000, "Daviplata": 0, "Uber": 304000, "Didi": 105000, "Caja Social": 0 },
        servicios: [
            { n: 'Cuota Carro', v: 1165000, p: false },
            { n: 'Tarjeta Nu', v: 1000000, p: false },
            { n: 'Mundo Mujer', v: 330000, p: false },
            { n: 'Administración', v: 220000, p: false },
            { n: 'Universidad Felipe', v: 600000, p: false },
            { n: 'Internet Jorge', v: 35000, p: false },
            { n: 'Cuota Celulares', v: 80000, p: false },
            { n: 'Luz', v: 138700, p: false },
            { n: 'Agua', v: 95000, p: false },
            { n: 'Gas', v: 20000, p: false },
            { n: 'Cadena Juan Carlos', v: 450000, p: false }
        ],
        extras: [
            { n: 'Cauchos Puertas Carro', v: 160000, p: false },
            { n: 'Arreglo Farola Carro', v: 17000, p: false },
            { n: 'Estribo Delantero Izq', v: 300000, p: false },
            { n: 'Rectificacion Rines', v: 400000, p: false },
            { n: 'Impuesto Carro', v: 640000, p: false },
            { n: 'Soat Carro', v: 545000, p: false },
            { n: 'Poliza Carro', v: 3200000, p: false }
        ],
        real: 0
    };

    let data = JSON.parse(localStorage.getItem('finanzasJorgeV2')) || inicial;

    function guardar() {
        localStorage.setItem('finanzasJorgeV2', JSON.stringify(data));
        render();
    }

    function render() {
        document.getElementById('txtReal').innerText = `$${data.real.toLocaleString()}`;
        
        // Render Cuentas
        const divC = document.getElementById('listaCuentas');
        divC.innerHTML = '';
        for (let c in data.cuentas) {
            divC.innerHTML += `<div class="item-row"><span>${c}</span><span class="amount">$${data.cuentas[c].toLocaleString()}</span></div>`;
        }

        // Render Servicios
        renderLista('listaServicios', data.servicios);
        // Render Extras
        renderLista('listaExtras', data.extras);
    }

    function renderLista(id, lista) {
        const div = document.getElementById(id);
        div.innerHTML = '';
        lista.forEach((s, i) => {
            div.innerHTML += `
                <div class="item-row">
                    <span>${s.n}<br><small style="color:#888">$${s.v.toLocaleString()}</small></span>
                    <span class="status-pill ${s.p ? 'paid' : 'pending'}" onclick="abrirModal('${id}', ${i})">
                        ${s.p ? 'PAGADO' : 'PENDIENTE'}
                    </span>
                </div>`;
        });
    }

    let targetList = null;
    let targetIdx = null;

    function abrirModal(listId, idx) {
        const lista = listId === 'listaServicios' ? data.servicios : data.extras;
        if (lista[idx].p) return;
        targetList = lista;
        targetIdx = idx;
        const divOps = document.getElementById('opcionesCuenta');
        divOps.innerHTML = '';
        for (let c in data.cuentas) {
            divOps.innerHTML += `<button class="modal-btn" onclick="pagar('${c}')">${c} ($${data.cuentas[c].toLocaleString()})</button>`;
        }
        document.getElementById('modal').style.display = 'flex';
    }

    function pagar(cuenta) {
        const item = targetList[targetIdx];
        if (data.cuentas[cuenta] >= item.v) {
            data.cuentas[cuenta] -= item.v;
            data.real += item.v;
            item.p = true;
            cerrarModal();
            guardar();
        } else { alert("Saldo insuficiente"); }
    }

    function cerrarModal() { document.getElementById('modal').style.display = 'none'; }

    render();
</script>

</body>
</html>
