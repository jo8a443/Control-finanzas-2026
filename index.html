<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Jorge 2026</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); font-size: 1.1em; border-left: 4px solid var(--accent); padding-left: 10px; margin: 0 0 15px 0; }
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { padding: 12px; background: #ebf5fb; border-radius: 8px; text-align: center; }
        .stat label { font-size: 0.7em; color: #555; display: block; text-transform: uppercase; margin-bottom: 5px; }
        .stat b { font-size: 1.1em; color: var(--accent); }
        .item-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; align-items: center; }
        .amount { font-weight: bold; color: var(--primary); }
        .status-pill { padding: 6px 12px; border-radius: 20px; font-size: 0.7em; cursor: pointer; font-weight: bold; border: 1px solid; transition: 0.3s; }
        .pending { background: #fff5f5; color: var(--danger); border-color: var(--danger); }
        .paid { background: #e9f7ef; color: var(--success); border-color: var(--success); }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 10; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; }
        .reset-btn { width: 100%; margin-top: 20px; padding: 10px; background: #eee; border: none; border-radius: 8px; color: #666; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="card">
    <h2>Resumen Mensual</h2>
    <div class="balance-grid">
        <div class="stat"><label>Presupuesto</label><b>$5,750,000</b></div>
        <div class="stat"><label>Gasto Real</label><b id="txtReal" style="color: var(--danger)">$0</b></div>
    </div>
</div>

<div class="card">
    <h2>Cuentas (Saldos)</h2>
    <div id="listaCuentas"></div>
</div>

<div class="card">
    <h2>Pagos Pendientes</h2>
    <div id="listaServicios"></div>
    <button class="reset-btn" onclick="reiniciarMes()">Reiniciar Pagos del Mes</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h3>¿Cómo pagaste esto?</h3>
        <div id="opcionesCuenta"></div>
        <button onclick="cerrarModal()" style="background:#888; margin-top:10px" class="modal-btn">Cancelar</button>
    </div>
</div>

<script>
    // Configuración Inicial (Se usa si no hay datos guardados)
    const inicial = {
        cuentas: { "Efectivo": 320000, "Nequi": 123000, "Didi/Uber": 409000 },
        servicios: [
            { nombre: 'Cuota Carro', monto: 1165000, pagado: false },
            { nombre: 'Administración', monto: 220000, pagado: false },
            { nombre: 'Luz', monto: 138700, pagado: false },
            { nombre: 'Internet', monto: 95000, pagado: false },
            { nombre: 'Gas', monto: 20000, pagado: false }
        ],
        gastoReal: 0
    };

    // Cargar datos de LocalStorage o usar iniciales
    let data = JSON.parse(localStorage.getItem('finanzasJorge')) || inicial;

    function guardar() {
        localStorage.setItem('finanzasJorge', JSON.stringify(data));
        actualizarUI();
    }

    function actualizarUI() {
        document.getElementById('txtReal').innerText = `$${data.gastoReal.toLocaleString()}`;
        
        const divCuentas = document.getElementById('listaCuentas');
        divCuentas.innerHTML = '';
        for (let c in data.cuentas) {
            divCuentas.innerHTML += `<div class="item-row"><span>${c}</span><span class="amount">$${data.cuentas[c].toLocaleString()}</span></div>`;
        }

        const divServicios = document.getElementById('listaServicios');
        divServicios.innerHTML = '';
        data.servicios.forEach((s, i) => {
            divServicios.innerHTML += `
                <div class="item-row">
                    <span>${s.nombre} <br><small style="color:#888">$${s.monto.toLocaleString()}</small></span>
                    <span class="status-pill ${s.pagado ? 'paid' : 'pending'}" onclick="abrirModal(${i})">
                        ${s.pagado ? '✓ PAGADO' : 'PENDIENTE'}
                    </span>
                </div>`;
        });
    }

    let indexEdit = null;
    function abrirModal(index) {
        if (data.servicios[index].pagado) return;
        indexEdit = index;
        const divOps = document.getElementById('opcionesCuenta');
        divOps.innerHTML = '';
        for (let c in data.cuentas) {
            divOps.innerHTML += `<button class="modal-btn" onclick="procesarPago('${c}')">${c}</button>`;
        }
        document.getElementById('modal').style.display = 'flex';
    }

    function procesarPago(cuenta) {
        const monto = data.servicios[indexEdit].monto;
        if (data.cuentas[cuenta] >= monto) {
            data.cuentas[cuenta] -= monto;
            data.gastoReal += monto;
            data.servicios[indexEdit].pagado = true;
            cerrarModal();
            guardar();
        } else { alert("Saldo insuficiente en " + cuenta); }
    }

    function cerrarModal() { document.getElementById('modal').style.display = 'none'; }

    function reiniciarMes() {
        if(confirm("¿Quieres marcar todos los servicios como pendientes para el nuevo mes?")) {
            data.servicios.forEach(s => s.pagado = false);
            data.gastoReal = 0;
            guardar();
        }
    }

    actualizarUI();
</script>

</body>
</html>
